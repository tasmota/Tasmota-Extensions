<style>
  .border {
    display: none;
    margin-top: 5px;
    padding: 1px;
    border: 1px solid var(--c_txt);
    background-color: black;
    box-sizing: border-box;
  }

  #canvas {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
</style>
<table style="width: 100%;">
  <tbody>
    <tr>
      <td>
        <button id="lvBtn">LVGL screen mirroring</button>
        <div class="border">
          <canvas id="canvas"></canvas>
        </div>
      </td>
    </tr>
  </tbody>
</table>
<script>
  const LV_MAGIC = 0x564C;
  const HEADER_WORDS = 5; // 10 bytes: 2(LV) + 2(x) + 2(y) + 2(w) + 2(h)
  const RGB565_LUT = new Uint32Array(0x10000);

  const lvBtn = document.getElementById('lvBtn');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext("2d");

  let abortController = null;
  let isStreaming = false;
  let imageData, argb, readBuf, readBuf16, updateBuffer;

  // RGB565 to ARGB8888 (Little Endian: AABBGGRR) using bit replication
  for (let p = 0; p < 0x10000; p++) {
    RGB565_LUT[p] = 0xFF000000 | // Alpha (opaque)
      (((p & 0xF800) >>> 8) | ((p & 0xE000) >>> 13)) | // R 5-bit abcde -> abcdeabc
      (((p & 0x07E0) << 5) | ((p & 0x0600) >>> 1)) |   // G 6-bit abcdef -> abcdefab
      (((p & 0x001F) << 19) | ((p & 0x001C) << 14));   // B 5-bit abcde -> abcdeabc
  }

  async function startStream(url) {
    const border = canvas.parentElement;
    border.style.display = 'block';
    abortController = new AbortController();
    var width = 0;
    var height = 0;
    try {
      const response = await fetch(url, { signal: abortController.signal });
      const screenSize = response.headers.get('Screen-Size');
      if (screenSize) {
        [width, height] = screenSize.split('x').map(Number);
        if (!imageData) {
          const parentWidth = border.parentElement.clientWidth;
          border.style.width = parentWidth + 'px';
          border.style.height = (parentWidth * height / width) + 'px';
          canvas.width = width;
          canvas.height = height;
          imageData = ctx.createImageData(width, height);
          argb = new Uint32Array(imageData.data.buffer);
          readBuf = new Uint8Array(width * height * 2 + HEADER_WORDS * 2);
          readBuf16 = new Uint16Array(readBuf.buffer);
          updateBuffer = new Uint16Array(width * height);
        }
        isStreaming = true;
      } else {
        console.error('Expecting screen size header.');
        stopStream();
        return;
      }
      const reader = response.body.getReader();
      let available = 0;
      let expectedPixels, x, y, w, h;
      let readOffset, dIdx, dInc, uIdx;
      let drawnRows = 0;
      let frameStart = 0;
      while (isStreaming) {
        const { value, done } = await reader.read();
        if (done) break;
        readBuf.set(value, available * 2);
        available += value.length / 2;
        while (true) {
          if (!expectedPixels) {
            if (available - frameStart < HEADER_WORDS) break;
            [magic, x, y, w, h] = readBuf16.subarray(frameStart);
            if (magic !== LV_MAGIC) {
              console.error("Sync Error: No magic found");
              stopStream();
              return;
            }
            expectedPixels = w * h;
            readOffset = frameStart + HEADER_WORDS;
            writeOffset = 0;
            drawnRows = 0;
            dIdx = y * width + x;
            dInc = width - w;
            uIdx = 0;
          }
          while (readOffset < available && writeOffset < expectedPixels) {
            const header = readBuf16[readOffset];
            const isRun = header & 0x8000;
            const count = (header & 0x7FFF) + (isRun ? 2 : 1);
            if (available < readOffset + 1 + (isRun ? 1 : count)) break;
            readOffset++;
            if (isRun) {
              updateBuffer.fill(readBuf16[readOffset++], writeOffset, writeOffset + count);
            } else {
              updateBuffer.set(readBuf16.subarray(readOffset, readOffset + count), writeOffset);
              readOffset += count;
            }
            writeOffset += count;
          }
          const availableRows = Math.floor(writeOffset / w);
          if (availableRows > drawnRows) {
            const newRows = availableRows - drawnRows;
            for (let r = 0; r < newRows; r++, dIdx += dInc) {
              for (let c = 0; c < w; c++) {
                argb[dIdx++] = RGB565_LUT[updateBuffer[uIdx++]];
              }
            }
            ctx.putImageData(imageData, 0, 0, x, y + drawnRows, w, newRows);
            drawnRows = availableRows;
          }
          if (writeOffset < expectedPixels) break;
          frameStart = readOffset;
          expectedPixels = undefined;
        }
        if (frameStart > 0) {
          if (frameStart < available) {
            readBuf16.copyWithin(0, frameStart, available);
            readOffset -= frameStart;
          } else {
            readOffset = 0;
          }
          available -= frameStart;
          frameStart = 0;
        }
      }
    } catch (err) {
      if (err.name !== 'AbortError') console.error("Stream Error: ", err);
    } finally {
      stopStream();
    }
  }

  function stopStream() {
    canvas.parentElement.style.display = 'none';
    isStreaming = false;
    if (abortController) {
      abortController.abort();
    }
    if (imageData) {
      argb.fill(0);
      ctx.putImageData(imageData, 0, 0);
      imageData = undefined
    }
  }

  function sendTouchEvent(e) {
    e.preventDefault();
    if (e.type === "mousemove" && e.buttons !== 1) return;
    const rect = canvas.getBoundingClientRect();
    const x = Math.round((e.clientX - rect.left) * (canvas.width / rect.width));
    const y = Math.round((e.clientY - rect.top) * (canvas.height / rect.height));
    const t = e.type === "mouseup" ? 0 : 1;
    const host = getHost();
    fetch(`http://${host}/lvgl_touch`, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({ x, y, t }).toString()
    }).catch(err => console.error("Touch event error:", err));
  }

  canvas.addEventListener("mousemove", sendTouchEvent);
  canvas.addEventListener("mouseup", sendTouchEvent);
  canvas.addEventListener("mousedown", sendTouchEvent);

  lvBtn.addEventListener('click', (e) => {
    const host = getHost();
    isStreaming ? stopStream() : startStream(`http://${host}:8881`);
  });

  function getHost() {
    return window.location.hostname || 'localhost';
  }
</script>
